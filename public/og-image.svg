<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="550" r="180" fill="rgba(255,255,255,0.05)"/>
  <circle cx="950" cy="100" r="80" fill="rgba(255,255,255,0.04)"/>
  <circle cx="200" cy="500" r="60" fill="rgba(255,255,255,0.04)"/>

  <!-- Decorative rounded rectangles -->
  <rect x="50" y="400" width="140" height="140" rx="30" fill="rgba(255,255,255,0.06)" transform="rotate(-15 120 470)"/>
  <rect x="1000" y="50" width="100" height="100" rx="20" fill="rgba(255,255,255,0.06)" transform="rotate(20 1050 100)"/>
  <rect x="900" y="420" width="120" height="120" rx="25" fill="rgba(255,255,255,0.05)" transform="rotate(10 960 480)"/>

  <!-- Small dot decorations -->
  <circle cx="300" cy="150" r="6" fill="rgba(255,255,255,0.2)"/>
  <circle cx="850" cy="200" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="700" cy="100" r="5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="400" cy="500" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="750" cy="520" r="6" fill="rgba(255,255,255,0.12)"/>

  <!-- Calculator icon (left side decoration) -->
  <g transform="translate(160, 240)" opacity="0.15">
    <rect width="80" height="100" rx="10" fill="white"/>
    <rect x="10" y="10" width="60" height="20" rx="4" fill="#2563eb"/>
    <rect x="10" y="40" width="15" height="15" rx="3" fill="#2563eb"/>
    <rect x="32" y="40" width="15" height="15" rx="3" fill="#2563eb"/>
    <rect x="54" y="40" width="15" height="15" rx="3" fill="#2563eb"/>
    <rect x="10" y="62" width="15" height="15" rx="3" fill="#2563eb"/>
    <rect x="32" y="62" width="15" height="15" rx="3" fill="#2563eb"/>
    <rect x="54" y="62" width="15" height="15" rx="3" fill="#2563eb"/>
  </g>

  <!-- Tool/wrench icon (right side decoration) -->
  <g transform="translate(960, 260)" opacity="0.15">
    <circle cx="30" cy="30" r="25" fill="none" stroke="white" stroke-width="6"/>
    <rect x="48" y="48" width="40" height="8" rx="4" fill="white" transform="rotate(45 48 48)"/>
  </g>

  <!-- Badge: 74개의 무료 도구 -->
  <rect x="440" y="180" width="320" height="50" rx="25" fill="rgba(255,255,255,0.2)"/>
  <rect x="440" y="180" width="320" height="50" rx="25" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="600" y="213" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="600">74개의 무료 도구</text>

  <!-- Main title -->
  <text x="600" y="320" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="80" fill="white" text-anchor="middle" font-weight="800" letter-spacing="2">모두의도구</text>

  <!-- Subtitle -->
  <text x="600" y="390" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="32" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="400">생활 계산기 &amp; 온라인 도구 모음</text>

  <!-- Bottom divider line -->
  <rect x="480" y="430" width="240" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>

  <!-- Domain -->
  <text x="600" y="480" font-family="'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="400">modu-dogu.pages.dev</text>
</svg>